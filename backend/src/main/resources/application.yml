# 共用設定(所有 profile 生效)。
# 敏感值一律走環境變數;本檔禁止出現任何祕密。
# 資料來源等連線設定放在 dev / prod profile 文件中,
# 整合測試由 Testcontainers @ServiceConnection 提供連線,不讀本檔的連線設定。
spring:
  application:
    name: seckill-backend
  threads:
    virtual:
      enabled: true   # Java 25 Virtual Threads
  flyway:
    enabled: true
    locations: classpath:db/migration
  rabbitmq:
    # 生產端可靠性(設計文件第 7 節):correlated confirms + mandatory + returns,
    # 供 OrderMessagePublisher 同步判定發送成功;失敗則回補 Redis。
    publisher-confirm-type: correlated
    publisher-returns: true
    template:
      mandatory: true
    listener:
      simple:
        # 手動 ack:業務成功才 ack(設計文件第 7 節);消費併發從 4 起,依壓測調整
        acknowledge-mode: manual
        concurrency: 4

mybatis:
  mapper-locations: classpath:mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true

seckill:
  id:
    # 單機 MVP 固定 0;未來多實例改由啟動時從 Redis 分配
    worker-id: ${WORKER_ID:0}
    datacenter-id: ${DATACENTER_ID:0}
  jwt:
    # 至少 256 bit;一律由環境變數注入,禁止硬編碼
    secret: ${JWT_SECRET}
    access-ttl: 15m
    refresh-ttl: 7d
  cors:
    # 逗號分隔;dev 允許本機前端,prod 由環境變數覆蓋為正式網域
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}
  admin:
    # ADMIN 種子帳號(環境變數驅動,兩者皆設才建立;不設則略過)。憑證不入 repo。
    username: ${SECKILL_ADMIN_USERNAME:}
    password: ${SECKILL_ADMIN_PASSWORD:}
  ratelimit:
    # 搶購限流(Bucket4j + Redis)。每秒容量;正式環境可依壓測經 env 覆寫(設計文件第 10 節)。
    global-capacity: ${SECKILL_RL_GLOBAL:3000}          # 全域 QPS 上限(/seckill/purchase)
    user-capacity: ${SECKILL_RL_USER:2}                 # 單用戶對 /seckill/purchase 每秒
    ip-capacity: ${SECKILL_RL_IP:10}                    # 單 IP 每秒(/seckill/purchase)
    token-user-capacity: ${SECKILL_RL_TOKEN_USER:5}     # 單用戶領 token(/seckill/token)每秒

management:
  endpoints:
    web:
      exposure:
        include: health,prometheus   # 僅暴露 health 與 prometheus,且僅限 Docker 內網存取

server:
  port: 8080
  shutdown: graceful

---
# ===== dev:本地開發(中介軟體由 infra/docker-compose.dev.yml 提供)=====
spring:
  config:
    activate:
      on-profile: dev
  datasource:
    url: jdbc:postgresql://localhost:5432/${POSTGRES_DB:seckill}
    username: ${POSTGRES_USER:seckill}
    password: ${POSTGRES_PASSWORD}
  data:
    redis:
      host: localhost
      port: 6379
  rabbitmq:
    host: localhost
    port: 5672
    username: ${RABBITMQ_USER}
    password: ${RABBITMQ_PASSWORD}

---
# ===== prod:正式環境(容器間以 Docker 內網服務名互連,全部由環境變數注入)=====
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD}
  rabbitmq:
    host: ${RABBITMQ_HOST}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER}
    password: ${RABBITMQ_PASSWORD}
