# 前端靜態檔服務。只在 Docker 內網被 Caddy 反代,不對外開 port(設計第 10.4 節);
# HTTPS、HSTS、CSP 等安全 header 一律由 Caddy 那層統一處理,這裡不重複。
server {
    listen       8080;
    server_name  _;

    root  /usr/share/nginx/html;
    index index.html;

    gzip            on;
    gzip_types      text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Vue Router history 模式:找不到實體檔案就交回 index.html 由前端路由接手
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Vite 產物檔名帶 content hash,可長期快取
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # index.html 不快取,否則部署新版後使用者仍會拿到舊的 asset 參照
    location = /index.html {
        add_header Cache-Control "no-cache";
    }
}
