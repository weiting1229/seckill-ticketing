# 本地開發用:僅中介軟體(backend / frontend 直接在本機跑)
# 使用方式(於 repo 根目錄,先 cp .env.example .env 並填值):
#   docker compose -f infra/docker-compose.dev.yml --env-file .env up -d
name: seckill-dev

services:
  postgres:
    image: postgres:17
    container_name: seckill-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?請在 .env 設定 POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER:?請在 .env 設定 POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?請在 .env 設定 POSTGRES_PASSWORD}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7
    container_name: seckill-redis
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis-data:/data
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: seckill-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:?請在 .env 設定 RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:?請在 .env 設定 RABBITMQ_PASSWORD}
    ports:
      - "127.0.0.1:5672:5672"    # AMQP
      - "127.0.0.1:15672:15672"  # management UI
      - "127.0.0.1:15692:15692"  # prometheus metrics
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
      # 啟用 management + prometheus plugin
      - ./rabbitmq/enabled_plugins:/etc/rabbitmq/enabled_plugins:ro
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  pg-data:
  redis-data:
  rabbitmq-data:
