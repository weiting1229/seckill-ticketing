# RabbitMQ 設定(M6 監控)。
# 開啟 per-object(per-queue)Prometheus 指標,使 15692 的 rabbitmq_queue_* 帶 queue 標籤。
# 目的:
#   1) backlog 告警只鎖定 work queue(seckill.order.queue),排除 order.timeout.queue
#      —— 後者在壓測時會合法堆積 15 分鐘支付逾時 timer,不可視為積壓。
#   2) DLQ(seckill.order.dlq)可單獨偵測「出現任何訊息」。
prometheus.return_per_object_metrics = true
