# Grafana datasource 自動載入(M6)。啟動即註冊 Prometheus 為預設資料源,免手動設定。
apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    uid: prometheus          # 固定 uid,供 dashboard JSON 穩定引用
    access: proxy
    # 同一 docker network(seckill-dev_default),以容器名連 Prometheus
    url: http://seckill-prometheus:9090
    isDefault: true
    editable: false
    jsonData:
      timeInterval: 15s   # 對齊 prometheus.yml scrape_interval,rate() 計算基準一致
